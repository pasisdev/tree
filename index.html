<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <script src="Tree_Cutter.js"></script>

  <style>
    body {
      padding: 1em;
    }

    #castle-loading-info {
      font-style: italic;
    }

    canvas#castle-canvas {
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      outline: none;
      -webkit-tap-highlight-color: rgba(255,255,255,0);
    }
  </style>
</head>

<body>
  <div class="container">

    <div id="castle-loading-info">Loading application...</div>

    <div id="castle-loading-progress-container" class="progress" role="progressbar">
      <div id="castle-loading-progress-bar" class="progress-bar progress-bar-striped progress-bar-animated" style="width: 0%"></div>
    </div>

    <canvas width="960" height="540"
      style="width: 960px; height: 540px;"
      id="castle-canvas">
    </canvas>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const canvas = document.getElementById("castle-canvas");

    function resizeTheCanvasToDisplaySize(entries) {
      const entry = entries[0];
      let width;
      let height;

      if (entry.devicePixelContentBoxSize) {
        width = entry.devicePixelContentBoxSize[0].inlineSize;
        height = entry.devicePixelContentBoxSize[0].blockSize;
      } else {
        width = Math.round(entry.contentBoxSize[0].inlineSize * devicePixelRatio);
        height = Math.round(entry.contentBoxSize[0].blockSize * devicePixelRatio);
      }

      canvas.width = width;
      canvas.height = height;
    }

    const observer = new ResizeObserver(resizeTheCanvasToDisplaySize);
    observer.observe(canvas);

    // keep touch responsive on iOS without breaking layout
    canvas.addEventListener("touchstart", function(e) {
      e.preventDefault();
    }, { passive: false });

    canvas.addEventListener("touchmove", function(e) {
      e.preventDefault();
    }, { passive: false });

    rtl.showUncaughtExceptions = true;
    window.addEventListener("load", rtl.run);
  </script>

</body>
</html>
