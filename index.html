<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title></title>

  <script src="Tree_Cutter.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
      touch-action: none;
    }

    canvas#castle-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;

      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      outline: none;
      -webkit-tap-highlight-color: rgba(0,0,0,0);
      touch-action: none;
    }

    #castle-loading-info {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      font-family: sans-serif;
      z-index: 10;
    }
  </style>
</head>

<body>

  <div id="castle-loading-info">Loading...</div>

  <canvas id="castle-canvas">
    Your browser does not support canvas.
  </canvas>

  <script>
    const canvas = document.getElementById("castle-canvas");

    function resizeCanvas(entries) {
      const entry = entries[0];
      let width, height;

      if (entry.devicePixelContentBoxSize) {
        width = entry.devicePixelContentBoxSize[0].inlineSize;
        height = entry.devicePixelContentBoxSize[0].blockSize;
      } else {
        width = Math.round(canvas.clientWidth * window.devicePixelRatio);
        height = Math.round(canvas.clientHeight * window.devicePixelRatio);
      }

      canvas.width = width;
      canvas.height = height;
    }

    const observer = new ResizeObserver(resizeCanvas);
    observer.observe(canvas);

    // iOS touch fix
    function preventDefaultTouch(e) {
      e.preventDefault();
    }

    canvas.addEventListener("touchstart", preventDefaultTouch, { passive: false });
    canvas.addEventListener("touchmove", preventDefaultTouch, { passive: false });
    canvas.addEventListener("touchend", preventDefaultTouch, { passive: false });

    // ensure focus for input
    canvas.addEventListener("touchstart", function() {
      canvas.focus();
    });

    rtl.showUncaughtExceptions = true;
    window.addEventListener("load", rtl.run);
  </script>

</body>
</html>
